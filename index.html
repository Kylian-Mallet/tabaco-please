<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Tabaco Please</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0c0b0a;
        color: #e8e8e8;
        font-family: monospace;
      }
      /* The visible canvas fills the whole viewport. The game renders into a
         480x270 offscreen backbuffer that main.ts upscales (integer, no smooth)
         into this canvas with dark letterbox bars. */
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #0c0b0a;
        object-fit: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
