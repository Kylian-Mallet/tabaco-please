<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Tabac "carotte" enseigne: red double-cone lozenge on dark wood -->
  <rect width="32" height="32" fill="#2b1d12"/>
  <rect x="2" y="2" width="28" height="28" fill="#0c0b0a"/>
  <!-- Red lozenge (carotte), built from stacked rows for a pixel look -->
  <g fill="#b1322f">
    <rect x="14" y="4"  width="4"  height="2"/>
    <rect x="12" y="6"  width="8"  height="2"/>
    <rect x="10" y="8"  width="12" height="2"/>
    <rect x="9"  y="10" width="14" height="2"/>
    <rect x="9"  y="12" width="14" height="2"/>
    <rect x="9"  y="14" width="14" height="4"/>
    <rect x="9"  y="18" width="14" height="2"/>
    <rect x="9"  y="20" width="14" height="2"/>
    <rect x="10" y="22" width="12" height="2"/>
    <rect x="12" y="24" width="8"  height="2"/>
    <rect x="14" y="26" width="4"  height="2"/>
  </g>
  <!-- Highlight + cream label band -->
  <rect x="11" y="10" width="3" height="8" fill="#c9534a"/>
  <rect x="9"  y="15" width="14" height="2" fill="#e7ddc4"/>
</svg>
